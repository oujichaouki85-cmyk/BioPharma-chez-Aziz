// ===== LOAD FAMILLE =====
window.loadFam = function(name, img){

    // ? METTRE L'IMAGE
    document.getElementById("bg").src = img;

    let container = document.getElementById("products");
    container.innerHTML = "";

    produits[name].forEach(p =>{
        let final = p.prix - (p.prix * p.remise / 100);

        container.innerHTML += `
        <div class="card">
            <h3>${p.nom}</h3>
            Prix: ${p.prix} â‚¬<br>
            Remise: ${p.remise}%<br>
            Final: ${final.toFixed(2)} â‚¬<br>
            Stock: ${p.stock}<br>
            <button onclick="addCart('${p.nom}', ${final})">Ajouter</button>
        </div>`;
    });
}



// ===== SLIDER =====
window.scrollLeft = () => famDiv.scrollBy({left:-200,behavior:"smooth"});
window.scrollRight = () => famDiv.scrollBy({left:200,behavior:"smooth"});

// ===== PANIER =====
function getCart(){ return JSON.parse(localStorage.getItem("cart")) || []; }
function saveCart(c){ localStorage.setItem("cart", JSON.stringify(c)); }

// ? FIX ADD CART
window.addCart = function(nom, prix){
    let cart = getCart();

    let item = cart.find(i=>i.nom === nom);

    if(item){
        item.qte++;
    } else {
        cart.push({nom:nom, prix:prix, qte:1});
    }

    saveCart(cart);
    updateCart();

    console.log("Panier:", cart); // debug ?
}

// ===== UPDATE =====
function updateCart(){
    let cart = getCart();

    let list = document.getElementById("cartItems");
    list.innerHTML = "";

    let total=0, count=0;

    cart.forEach((it,i)=>{
        let sub = it.prix * it.qte;
        total += sub;
        count += it.qte;

        list.innerHTML += `
        <li>
            ${it.nom}
            <button onclick="qty(${i},-1)">-</button>
            ${it.qte}
            <button onclick="qty(${i},1)">+</button>
            = ${sub.toFixed(2)} â‚¬
            <button onclick="del(${i})">X</button>
        </li>`;
    });

    document.getElementById("total").innerText = "Total : " + total.toFixed(2) + " â‚¬";
    document.getElementById("count").innerText = count;
}

// ===== ACTIONS =====
window.qty = function(i,d){
    let c = getCart();
    c[i].qte += d;
    if(c[i].qte <= 0) c.splice(i,1);
    saveCart(c);
    updateCart();
}

window.del = function(i){
    let c = getCart();
    c.splice(i,1);
    saveCart(c);
    updateCart();
}
window.clearCart = function(){
 localStorage.setItem("cart", JSON.stringify([]));
 updateCart();
}
// ===== PANEL =====
window.toggleCart = function(){
    document.getElementById("cartPanel").classList.toggle("open");
}
window.showCheckout = function(){
 document.getElementById("checkoutForm").style.display = "block";
}
